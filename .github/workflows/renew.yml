name: Host2Play Auto Renew

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 8:00 / 16:00 UTC 左右
    - cron: "21 7,23 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 检出代码
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 如果是当前仓库，直接用 checkout@v4 即可；
          # 如果是私有仓库，请确保 PRIVATE_REPO_TOKEN 正确
          path: scripts

      # =========================
      # ⚡️ 环境准备
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      # =========================
      # 📡 安装 Hysteria2
      # =========================
      - name: Install Hysteria2
        run: |
          curl -L -o hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/
          hysteria version

      # =========================
      # 📦 Node 依赖 + Playwright
      # =========================
      - name: Install Node dependencies
        working-directory: scripts
        run: |
          npm init -y
          npm install playwright
          # 安装 chromium 及其系统驱动依赖
          npx playwright install --with-deps chromium

      # 🧩 下载并解压 NopeCHA (修复 404 问题)
      # =========================
      - name: Download and Unpack NopeCHA
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha/unpacked
          # 使用官方仓库的最新的 chromium 扩展包地址
          wget -O nopecha.zip https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
          
          # 使用 7z 或 unzip 解压
          unzip -o nopecha.zip -d extensions/nopecha/unpacked
          
          echo "📌 NopeCHA manifest check:"
          if [ -f "extensions/nopecha/unpacked/manifest.json" ]; then
            cat extensions/nopecha/unpacked/manifest.json
          else
            echo "❌ 错误: manifest.json 未找到，请检查解压路径"
            ls -R extensions/nopecha/unpacked
            exit 1
          fi

      # =========================
      # 🚀 执行续费脚本
      # =========================
      - name: Run renew script
        working-directory: scripts
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 增加一个变量让脚本知道它在 scripts 目录下
          NODE_PATH: .
        run: |
          mkdir -p screenshots
          # 使用 xvfb 模拟有头浏览器环境
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" node renew.js

      # =========================
      # 📤 上传截图 (报错排查关键)
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/*.png
          if-no-files-found: warn
